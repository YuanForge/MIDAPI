  jwt_expire_hours: 24

db:
  host: localhost
  port: 5432
  user: postgres
  password: ww123456
  dbname: fanapi
  sslmode: disable
  # 生产环境建议调大连接池，避免高并发时连接耗尽
  max_open_conns: 100    # 最大打开连接数（匹配 pgBouncer pool_size）
  max_idle_conns: 20     # 最大空闲连接数
  conn_max_idle_sec: 300 # 空闲连接超时（秒），防止 server 端踢掉连接

